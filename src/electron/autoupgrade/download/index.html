<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        overflow: hidden;
        margin: 0;
        height: 100vh;
        background: #f3f3f3;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .dialog {
        width: 420px;
        background: #fff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
      }
      .title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .bar {
        height: 8px;
        background: #e7e0ec;
        border-radius: 99px;
        overflow: hidden;
      }
      .fill {
        height: 100%;
        width: 0%;
        background: #6750a4;
        transition: width 0.2s;
      }
      .meta {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #666;
        margin-top: 8px;
      }
      .status {
        font-size: 13px;
        color: #444;
        margin-top: 12px;
        min-height: 18px;
      }
      .actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 18px;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 8px 14px;
        cursor: pointer;
      }
      .btn-text {
        background: transparent;
        color: #6750a4;
      }
    </style>
  </head>
  <body>
    <div class="dialog">
      <div class="title">Updating...</div>
      <div class="status" id="status">Starting download...</div>
      <div class="actions">
        <button class="btn-text" id="cancel">Cancel</button>
      </div>
    </div>
    <script>
      const statusEl = document.getElementById('status');

      window.electronApiDownload.onStatus((status) => {
        statusEl.textContent = status;
      });

      document.getElementById('cancel').onclick = () =>
        window.electronApiDownload.cancel();
    </script>
  </body>
</html>
