<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        background: #1a1a1a;
        background-image: url('../icons/tennis-icon.png');
        background-repeat: no-repeat;
        background-position: center;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: sans-serif;
        overflow: hidden;
        user-select: none;
      }
      .logo {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 2px;
      }
      .loader {
        margin-top: 20px;
        width: 32px;
        height: 32px;
        border: 3px solid #333;
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="logo">Live Tennis</div>
    <div class="loader"></div>
  </body>
</html>
